[theme]
# Calyx Containers — Neutral Warm Gray
primaryColor = "#4f46e5"
backgroundColor = "#f8f9fb"
secondaryBackgroundColor = "#eef0f4"
textColor = "#1e293b"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
